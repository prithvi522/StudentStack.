<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentStack | Master Programming</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>


<body>

<header>
<h1>Student<span>Stack</span></h1>
<p>Your premium gateway to coding mastery</p>
<button onclick="toggleTheme()">🌙 Toggle Theme</button>
<button id="backBtn" onclick="goBack()">⬅ Back</button>
</header>

<main>

<!-- CATEGORY SECTION -->

<section id="category-section" class="course-grid">

<div class="course-card" onclick="showCategory('frontend')">
💻 Frontend
</div>

<div class="course-card" onclick="showCategory('backend')">
🖥 Backend
</div>

<div class="course-card" onclick="showCategory('programming')">
🧠 Programming
</div>

<div class="course-card" onclick="showCategory('database')">
🗄 Database
</div>

</section>


<!-- FRONTEND COURSES -->

<section id="frontend-courses" class="course-grid" style="display:none;">

<div class="course-card" onclick="showCourse('HTML')">🌐 HTML</div>
<div class="course-card" onclick="showCourse('CSS')">🎨 CSS</div>
<div class="course-card" onclick="showCourse('JavaScript')">⚡ JavaScript</div>
<div class="course-card" onclick="showCourse('TypeScript')">📘 TypeScript</div>

</section>


<!-- BACKEND COURSES -->

<section id="backend-courses" class="course-grid" style="display:none;">

<div class="course-card" onclick="showCourse('Python')">🐍 Python</div>
<div class="course-card" onclick="showCourse('Java')">☕ Java</div>
<div class="course-card" onclick="showCourse('PHP')">🐘 PHP</div>
<div class="course-card" onclick="showCourse('Ruby')">💎 Ruby</div>
<div class="course-card" onclick="showCourse('Go')">🚀 Go</div>
<div class="course-card" onclick="showCourse('NodeJS')">🟢 NodeJS</div>
<div class="course-card" onclick="showCourse('SQL')">📊 SQL</div>

</section>


<!-- PROGRAMMING COURSES -->

<section id="programming-courses" class="course-grid" style="display:none;">

<div class="course-card" onclick="showCourse('C')">🔵 C</div>
<div class="course-card" onclick="showCourse('C++')">⚙ C++</div>
<div class="course-card" onclick="showCourse('C#')">🎯 C#</div>
<div class="course-card" onclick="showCourse('Go')">🚀 Go</div>

</section>


<!-- DATABASE COURSES -->

<section id="database-courses" class="course-grid" style="display:none;">

<div class="course-card" onclick="showCourse('SQL')">📊 SQL</div>
<div class="course-card" onclick="showCourse('Bash')">🖥 Bash</div>

</section>


<!-- COURSE CONTENT -->

<section id="workspace" class="workspace" style="display:none;">

<h2 id="courseTitle"></h2>

<div id="videoContainer"></div>

<div id="notesContainer"></div>

</section>

</main>

<script src="script.js"></script>


</body>
</html>
